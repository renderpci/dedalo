name: secrets-scan

# SEC-096: static secrets guardrail.
#
# Runs `gitleaks` on every push, pull-request and nightly schedule. The job
# fails loudly when a rule matches so a stale / committed secret never
# lands on a protected branch. `gitleaks` is preferred over `trufflehog`
# for Dédalo because:
#   - it ships a curated default ruleset (AWS / GCP / Stripe / PEM / JWT
#     / generic high-entropy tokens) with opt-out allowlisting,
#   - it scans both the working tree and the git history in one pass,
#   - it has a stable binary release (no runtime pull from a Docker
#     registry) and a well-tested GitHub Action at
#     https://github.com/gitleaks/gitleaks-action.
#
# Local equivalent (reproduce the CI check on a developer machine):
#     gitleaks detect --source . --verbose --redact

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  schedule:
    # Daily sweep at 04:17 UTC catches secrets that slip in via a merged
    # branch whose PR build passed before a new rule was added upstream.
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  # `security-events: write` lets the job upload a SARIF report to the
  # GitHub Security tab on supported plans. Harmless on free plans.
  security-events: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Full history so the scan can inspect deleted lines too. Without
          # this a secret that was added then "removed" in a subsequent
          # commit would still be recoverable from the pack but invisible
          # to the scanner.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Fail the job on any finding (default), but keep the scanner in
          # REDACT mode so raw secret bytes never appear in the CI log.
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'
          # The default config is good; override here if Dédalo ever needs
          # to allowlist a specific sample-config placeholder. Document
          # every allowlist entry with the matching SEC-ID.
          # GITLEAKS_CONFIG: .github/gitleaks.toml

          # GITHUB_TOKEN is provided automatically; required for PR
          # comments and SARIF upload.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Second, lightweight check — refuse pull requests that touch the
  # sample config files without flipping the sample sentinels. This is a
  # belt-and-braces companion to `dedalo_assert_secrets_initialised()`
  # (SEC-094) that fires at deploy time. The grep-based rule is
  # intentionally simple: it only inspects files touched in the PR and
  # only complains when the canonical sample sentinel is *kept*.
  sentinel-guard:
    name: sample-config sentinel guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Fail if committed config/*.php carries sample sentinels
        run: |
          set -eu
          # Only lint non-sample config files (config/sample.* are expected
          # to keep the placeholders). A real config/config.php committed
          # accidentally with defaults is the bug we want to catch.
          violations=0
          for f in $(git diff --name-only --diff-filter=AM "origin/${{ github.base_ref }}..HEAD" | grep -E '^config/[^/]+\.php$' | grep -v '^config/sample\.'); do
            if [ -f "$f" ]; then
              if grep -qE "'Dédalo install version'|'dedalo_six'|'mypassword'|'myusername'|'XXXXXXXXXX|'XXXXXXXXXXXXX\.\.'" "$f"; then
                echo "::error file=$f::Sample-default secret sentinel detected (SEC-094). Replace with strong unique values before committing."
                violations=$((violations+1))
              fi
            fi
          done
          if [ "$violations" -gt 0 ]; then
            exit 1
          fi
          echo "No sample sentinels found in committed config files."
