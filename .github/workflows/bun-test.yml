name: Bun diffusion engine tests

on:
  push:
    paths:
      - 'diffusion/api/v1/**'
      - '.github/workflows/bun-test.yml'
  pull_request:
    paths:
      - 'diffusion/api/v1/**'
      - '.github/workflows/bun-test.yml'

jobs:
  bun-test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: ci_test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: diffusion/api/v1

    env:
      # integration tests connect over TCP to the service container and
      # auto-create/drop the dedicated database web_test_diffusion
      DB_FORCE_TCP: '1'
      DB_HOST: 127.0.0.1
      DB_PORT: '3306'
      DB_USER: root
      DB_PASSWORD: ci_test_pass

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        # CONF-10: pin the Bun runtime so the MariaDB-owning diffusion engine is
        # tested against a fixed version, not a moving 'latest'. Bump deliberately.
        with:
          bun-version: 1.3.9

      - name: Install mariadb-client (mysqldump for backup_database tests)
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run tests (unit + contract + handler + integration)
        run: bun test
