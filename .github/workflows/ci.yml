# PR gate — HERMETIC TIER ONLY (engineering/CI.md).
#
# PUBLIC-REPO POSTURE (2026-07-11): renderpci/dedalo is PUBLIC, so NO job in this
# directory may target the self-hosted runner. A fork PR runs attacker-controlled
# code, and the self-hosted Mac holds the real ../private/.env and the live matrix
# Postgres — a self-hosted PR job there is remote code execution on the data host.
# The DB/parity/client tier lives in .github/workflows-private/ (inert here; GitHub
# only executes .github/workflows/) and runs ONLY on the private mirror.
# Do NOT move a self-hosted job back into this directory.
#
# hermetic — GitHub-hosted; typecheck + lint + DB-less tripwires via the shared
#            scripts/ci/hermetic.sh (the same script .gitlab-ci.yml runs, so the two
#            platforms cannot drift). No secrets, no DB, no oracle.
#
# Invariants in this file are enforced by test/unit/ci_workflow_tripwire.test.ts.
name: ci

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hermetic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version # the load-bearing pin — never inline a version
      - name: Hermetic tier (install + tsc + biome + static tripwires)
        run: bash scripts/ci/hermetic.sh
