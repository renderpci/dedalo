name: PHP Syntax Lint

on:
  push:
    branches: [v7_developer, master]
  pull_request:
    branches: [v7_developer, master]

jobs:
  lint:
    name: Check PHP Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring
          coverage: none

      - name: Lint PHP files
        # CONF-03: fail the job on any parse error. The previous pipe into
        # `grep ... || true` swallowed php -l exit codes, so a committed fatal
        # parse error could never fail this gate.
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "::error file=$file::PHP syntax error"
              php -l "$file" || true
              status=1
            fi
          done < <(find . -type f -name "*.php" \
            ! -path "./vendor/*" \
            ! -path "./lib/*" \
            ! -path "./.git/*" \
            -print0)
          exit $status
