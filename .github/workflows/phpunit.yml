name: PHPUnit Tests

on:
  push:
    branches: [v7_developer, master]
  pull_request:
    branches: [v7_developer, master]

jobs:
  test:
    name: Run PHPUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_pgsql
          coverage: none

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite "unit components"

      - name: Run API tests
        run: vendor/bin/phpunit --testsuite "unit API"

      - name: Run API contract tests
        run: vendor/bin/phpunit --testsuite contract

      - name: Check for breaking signature changes
        run: php dev/signature_tracker/signature-check.php --check
        continue-on-error: true

      - name: Check for ontology changes
        run: php dev/ontology_tracker/ontology-check.php --check
        continue-on-error: true
