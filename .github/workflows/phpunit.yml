name: PHPUnit Tests

on:
  push:
    branches: [v7_developer, master]
  pull_request:
    branches: [v7_developer, master]

jobs:
  test:
    name: Run PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: dedalo_test
          POSTGRES_PASSWORD: dedalo_test_pass
          POSTGRES_DB: dedalo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql
          coverage: none

      - name: Create config files
        run: |
          cp config/sample.config.php config/config.php
          cp config/sample.config_db.php config/config_db.php
          cp config/sample.config_core.php config/config_core.php
          # sample.config_db.php separates name/value with tabs, so anchor each
          # replacement on its define() line and swap only the quoted value.
          sed -i "/define('DEDALO_HOSTNAME_CONN',/ s/'localhost'/'127.0.0.1'/" config/config_db.php
          sed -i "/define('DEDALO_DATABASE_CONN',/ s/'dedalo_mydatabase'/'dedalo_test'/" config/config_db.php
          sed -i "/define('DEDALO_USERNAME_CONN',/ s/'myusername'/'dedalo_test'/" config/config_db.php
          sed -i "/define('DEDALO_PASSWORD_CONN',/ s/'mypassword'/'dedalo_test_pass'/" config/config_db.php
          sed -i "s/define('DEVELOPMENT_SERVER', false)/define('DEVELOPMENT_SERVER', true)/" config/config.php

      - name: Initialize database
        env:
          PGPASSWORD: dedalo_test_pass
        run: |
          gunzip -c install/db/dedalo6_install.pgsql.gz | psql -h 127.0.0.1 -U dedalo_test -d dedalo_test

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run all PHPUnit suites
        # CONF-02: run the full suite, not just components/API/contract/diffusion.
        # Previously security, login, search, tools, section_record, ts_object,
        # ontology, etc. (21 of 25 suites) never ran on push/PR, so regressions in
        # auth, SQO building and tool API gates shipped undetected. Ontology-guarded
        # suites (e.g. diffusion) skip cleanly when the install dump lacks their data.
        working-directory: test/server
        run: ../../vendor/bin/phpunit

      - name: Check for breaking signature changes
        run: php dev/signature_tracker/signature-check.php --check
        continue-on-error: true

      - name: Check for ontology changes
        run: php dev/ontology_tracker/ontology-check.php --check
        continue-on-error: true
