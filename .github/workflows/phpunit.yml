name: PHPUnit Tests

on:
  push:
    branches: [v7_developer, master]
  pull_request:
    branches: [v7_developer, master]

jobs:
  test:
    name: Run PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: dedalo_test
          POSTGRES_PASSWORD: dedalo_test_pass
          POSTGRES_DB: dedalo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_pgsql
          coverage: none

      - name: Create config files
        run: |
          cp config/sample.config.php config/config.php
          cp config/sample.config_db.php config/config_db.php
          sed -i "s/define('DEDALO_HOSTNAME_CONN', 'localhost')/define('DEDALO_HOSTNAME_CONN', '127.0.0.1')/" config/config_db.php
          sed -i "s/define('DEDALO_DATABASE_CONN', 'dedalo_mydatabase')/define('DEDALO_DATABASE_CONN', 'dedalo_test')/" config/config_db.php
          sed -i "s/define('DEDALO_USERNAME_CONN', 'myusername')/define('DEDALO_USERNAME_CONN', 'dedalo_test')/" config/config_db.php
          sed -i "s/define('DEDALO_PASSWORD_CONN', 'mypassword')/define('DEDALO_PASSWORD_CONN', 'dedalo_test_pass')/" config/config_db.php
          sed -i "s/define('DEVELOPMENT_SERVER', false)/define('DEVELOPMENT_SERVER', true)/" config/config.php

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests
        working-directory: test/server
        run: ../../vendor/bin/phpunit --testsuite "components"

      - name: Run API tests
        working-directory: test/server
        run: ../../vendor/bin/phpunit --testsuite "API"

      - name: Run API contract tests
        working-directory: test/server
        run: ../../vendor/bin/phpunit --testsuite "contract"

      - name: Check for breaking signature changes
        run: php dev/signature_tracker/signature-check.php --check
        continue-on-error: true

      - name: Check for ontology changes
        run: php dev/ontology_tracker/ontology-check.php --check
        continue-on-error: true
