# Post-push gate on the default branch — HERMETIC TIER ONLY (engineering/CI.md).
#
# BRANCH: `master` is this repo's default branch (renderpci/dedalo — the historic
# Dédalo repo, where the v4/v5/v6 PHP branches live alongside it). This workflow
# used to trigger on `main`, a branch that does not exist here, so it NEVER FIRED.
# Fixed 2026-07-11.
#
# PUBLIC-REPO POSTURE: the full DB/parity suite cannot run here — it needs the live
# matrix Postgres, which only the self-hosted Mac has, and this repo is PUBLIC (see
# ci.yml's header for why that forbids self-hosted jobs). The full tier lives in
# .github/workflows-private/ and runs on the private mirror. Here, a red `hermetic`
# is the alarm.
#
# Invariants in this file are enforced by test/unit/ci_workflow_tripwire.test.ts.
name: main

on:
  push:
    branches: [master]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hermetic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Hermetic tier (install + tsc + biome + static tripwires)
        run: bash scripts/ci/hermetic.sh
