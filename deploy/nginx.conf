# Dédalo v7 — reference nginx configuration.
#
# Drop this in as an http{}-scope snippet:
#   bare metal : /etc/nginx/conf.d/dedalo.conf   (Debian/Ubuntu also work with
#                sites-available + a symlink, but conf.d is included inside
#                http{}, which the `map` below REQUIRES)
#   container  : mounted at /etc/nginx/conf.d/default.conf
#
# Operator guide: docs/install/reverse_proxy.md
#
# Substitutions (search for these):
#   dedalo.example.org               your domain
#   /run/dedalo/dedalo_ts.sock       SERVER_UNIX_SOCKET
#   /opt/dedalo/master_dedalo        the repo
#   /srv/dedalo/media                MEDIA_PATH
#
# THE ROOT RULE (read this before you change a path):
#   The media rule files are GENERATED by the engine and carry no root/alias of
#   their own — they inherit the server root. So the server `root` MUST satisfy
#       <root> + /dedalo/<DEDALO_MEDIA_DIR>/…  ==  MEDIA_PATH/…
#   With the canonical layout (MEDIA_PATH=/srv/dedalo/media, media dir 'media')
#   that is exactly `root /srv;`. Get this wrong and every media file 404s while
#   the access gate itself still looks healthy.

# --- http{} scope ------------------------------------------------------------
# The auth-cookie sanitiser. A `map` cannot live inside server{}; omit this and
# nginx REFUSES TO START ("unknown $dedalo_auth_key") — deliberately, because a
# half-wired media gate must never boot half-open.
include /srv/dedalo/media/dedalo_media_protection_map.nginx.conf;

upstream dedalo_ts {
	server unix:/run/dedalo/dedalo_ts.sock;
}

server {
	listen 80;
	listen [::]:80;
	server_name dedalo.example.org;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;                       # multiplexes the ~100-module client boot graph
	server_name dedalo.example.org;

	ssl_certificate     /etc/letsencrypt/live/dedalo.example.org/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/dedalo.example.org/privkey.pem;
	ssl_protocols       TLSv1.2 TLSv1.3;

	# See THE ROOT RULE above. Only the generated media locations resolve files
	# against it; every other path is either proxied, aliased, or refused below.
	root /srv;

	# The client uploads in ~4 MB chunks and the engine accepts up to
	# SERVER_MAX_BODY_BYTES (256 MiB) per request. nginx's default is 1m, which
	# breaks every upload with a 413.
	client_max_body_size 300m;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options    "nosniff"   always;
	add_header X-Frame-Options           "SAMEORIGIN" always;
	add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

	# --- Media ---------------------------------------------------------------
	# GENERATED by the engine into MEDIA_PATH, refreshed at boot and at login.
	# Comment this line out until the server has run once (the file will not
	# exist yet). Until it is included, /dedalo/media/ falls through to the
	# client alias below and 404s — i.e. media is not served at all, which is the
	# safe failure.
	include /srv/dedalo/media/dedalo_media_protection.nginx.conf;

	# A stat() cache delays an unpublish taking effect. Keep it off.
	open_file_cache off;

	# --- Liveness probe → the Bun socket -------------------------------------
	# The engine serves its health check at the origin root `/health`
	# (src/server.ts). The watchdog hits it over the unix socket, but the
	# browser-facing system_info maintenance widget probes it over HTTP too, so
	# it must be reachable here — otherwise the catch-all `location / { 404 }`
	# below swallows it and the widget reports the engine unhealthy.
	location = /health {
		proxy_pass http://dedalo_ts;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
	}

	# --- API + dynamic routes → the Bun socket -------------------------------
	# A regex location beats every prefix location below it, so this keeps
	# precedence over the /dedalo/ static alias.
	location ~ ^/(api/v1/|dedalo/core/api/) {
		proxy_pass http://dedalo_ts;
		proxy_http_version 1.1;
		proxy_set_header Host              $host;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		# >= SERVER_IDLE_TIMEOUT_S (255). A lower value kills slow exports,
		# long searches and tool actions one hop before the engine would.
		proxy_read_timeout 300s;
		proxy_send_timeout 300s;
		# SSE + NDJSON streaming (assistant chat, diffusion, export).
		proxy_buffering off;
	}

	# --- Dynamic routes that live UNDER /dedalo/ but are NOT static files ----
	# Each of these is served by the engine, not from client/. Proxy them, or
	# they 404 against the client tree.

	# Third-party browser libraries (resolved through the allowlist to
	# node_modules/ and vendor/ — there is no client/dedalo/lib/ directory).
	location /dedalo/lib/ {
		proxy_pass http://dedalo_ts;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
	}

	# Tool packages (repo tools/ root) and the shared tool machinery.
	location /dedalo/tools/ {
		proxy_pass http://dedalo_ts;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
	}
	location /dedalo/core/tools_common/ {
		proxy_pass http://dedalo_ts;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
	}

	# The inline-tag image factory (one <img> per inline tag in a rich text).
	location = /dedalo/core/component_text_area/tag/ {
		proxy_pass http://dedalo_ts;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
	}

	# Ontology snapshots — only if this instance is an ontology master
	# (IS_AN_ONTOLOGY_SERVER=true). Harmless otherwise: the engine 404s.
	location /dedalo/install/import/ontology/ {
		proxy_pass http://dedalo_ts;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
	}

	# --- Entry points --------------------------------------------------------
	# The client tree has no index.html above core/page/, so these paths would hit
	# the alias below and 403/404 on a user who typed the mount point instead of
	# the full page path. The ENGINE answers them with the same 302 (server.ts
	# ENTRY_REDIRECT_PATHS) — repeated here only because nginx serves the client
	# tree itself and these requests never reach the socket. Exact (=) locations
	# win over both the prefix alias and the API regex above.
	location = /dedalo      { return 302 /dedalo/core/page/; }
	location = /dedalo/     { return 302 /dedalo/core/page/; }
	location = /dedalo/core { return 302 /dedalo/core/page/; }
	location = /dedalo/core/ { return 302 /dedalo/core/page/; }

	# --- Client static files -------------------------------------------------
	# The client tree is served IN PLACE (not content-hashed), so text assets
	# must revalidate — never mark them immutable.
	location /dedalo/ {
		alias /opt/dedalo/master_dedalo/client/dedalo/;
		etag on;
		add_header Cache-Control "no-cache";
		gzip on;
		gzip_types text/css application/javascript application/json image/svg+xml;
		gzip_min_length 1024;

		location ~* \.(png|jpe?g|gif|webp|ico|woff2?|ttf|otf)$ {
			add_header Cache-Control "public, max-age=3600";
		}
	}

	location = / { return 302 /dedalo/core/page/; }
	location   / { return 404; }
}
