# Dédalo Publication API v2 - Apache Reverse Proxy Configuration
# Place this file in /etc/apache2/conf-available/ or /etc/httpd/conf.d/
# Enable with: a2enconf dedalo_api && systemctl reload apache2

# Required modules
# a2enmod proxy proxy_http rewrite headers

<Location /publication/server_api/v2/>
    ProxyPass http://127.0.0.1:3100/
    ProxyPassReverse http://127.0.0.1:3100/

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # CORS (handled by Bun, but Apache can override if needed)
    # Header always set Access-Control-Allow-Origin "*"

    # Timeout settings
    ProxyTimeout 30

    # Disable proxy buffering for SSE (MCP)
    SetEnv proxy-nokeepalive 1
    SetEnv proxy-sendchunked 1
</Location>

# MCP SSE endpoint needs special handling
<Location /publication/server_api/v2/mcp>
    ProxyPass http://127.0.0.1:3100/mcp
    ProxyPassReverse http://127.0.0.1:3100/mcp

    # Disable buffering for Server-Sent Events
    SetEnv proxy-nokeepalive 1
    SetEnv proxy-sendchunked 1

    # Increase timeout for long-lived SSE connections
    ProxyTimeout 3600
</Location>

# Health check endpoint (optional: restrict to localhost)
<Location /publication/server_api/v2/health>
    ProxyPass http://127.0.0.1:3100/health
    ProxyPassReverse http://127.0.0.1:3100/health

    # Optional: restrict to localhost only
    # Require ip 127.0.0.1 ::1
</Location>
