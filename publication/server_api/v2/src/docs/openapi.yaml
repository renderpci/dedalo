openapi: 3.1.0
info:
  title: Dédalo Publication API v2
  description: |
    Read-only REST API for accessing published cultural heritage data from Dédalo.
    
    ## Overview
    This API provides access to published data stored in MariaDB. All endpoints are read-only.
    
    ## Authentication
    Optional API key via `X-API-Key` header. If configured, all requests require a valid key.
    
    ## Rate Limiting
    Default: 100 requests per minute per IP address.
    
    ## Filter DSL
    The `filter` parameter uses a safe DSL format: `field:operator:value`
    
    Operators: `eq`, `ne`, `gt`, `gte`, `lt`, `lte`, `like`, `in`, `not_in`, `is_null`, `is_not_null`
    
    Multiple conditions are comma-separated (AND logic).
    
    Examples:
    - `section_id:eq:1` → `WHERE section_id = 1`
    - `code:like:OH-%` → `WHERE code LIKE 'OH-%'`
    - `section_id:in:1|2|3` → `WHERE section_id IN (1, 2, 3)`
    - `lang:eq:lg-eng,code:like:OH-%` → `WHERE lang = 'lg-eng' AND code LIKE 'OH-%'`
    
    ## Order DSL
    The `order` parameter uses format: `field:direction`
    
    Direction: `asc` or `desc` (default: `asc`). Multiple fields are comma-separated.
    
    Examples:
    - `title:asc` → `ORDER BY title ASC`
    - `title:asc,section_id:desc` → `ORDER BY title ASC, section_id DESC`
    
    ## Deployment Modes
    - **Apache** (default): Reverse proxy on same machine as Dédalo
    - **Nginx**: Isolated publication server
    - **Standalone**: Direct Bun server
  version: 2.1.0
  contact:
    name: Dédalo Support
    url: https://dedalo.dev
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html

servers:
  - url: /publication/server_api/v2
    description: Default Apache deployment

paths:
  /schema:
    get:
      summary: Get database schema
      description: |
        Introspect the database structure. Returns available tables, their columns with types, and row counts.
        Replaces v1's `tables_info`, `publication_schema`, `table_thesaurus`, and `table_thesaurus_map`.
        Results are cached for 30 seconds.
      operationId: getSchema
      tags:
        - Schema
      parameters:
        - name: table
          in: query
          description: Specific table to inspect (optional, returns all if omitted)
          schema:
            type: string
          example: interview
      responses:
        '200':
          description: Schema information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
              example:
                tables:
                  - name: interview
                    columns:
                      - name: id
                        type: int
                      - name: section_id
                        type: int
                      - name: lang
                        type: varchar
                      - name: code
                        type: varchar
                      - name: title
                        type: varchar
                      - name: transcription
                        type: longtext
                    row_count: 142
        '500':
          $ref: '#/components/responses/InternalServerError'

  /search:
    get:
      summary: Unified search endpoint
      description: |
        Single endpoint with multiple modes for different query types:
        - **records**: Generic table query with filtering, pagination, sorting
        - **fulltext**: MariaDB FULLTEXT search with highlighted fragments
        - **text-fragment**: Extract excerpts from large publication texts with page references
        - **av-fragment**: Extract audiovisual interview fragments with video TC and media URLs

        Set `count=true` on any mode to get only the total matching records without data rows.

        Replaces v1's `records`, `free_search`, `global_search`, `text_fragment`, and all `thesaurus_*` endpoints.
      operationId: search
      tags:
        - Search
      parameters:
        - name: mode
          in: query
          description: Query mode
          schema:
            type: string
            enum: [records, fulltext, text-fragment, av-fragment]
            default: records
          example: records
        - name: table
          in: query
          required: true
          description: Target table name
          schema:
            type: string
          example: interview
        - name: fields
          in: query
          description: Comma-separated list of fields to return (records mode)
          schema:
            type: string
          example: section_id,code,title
        - name: filter
          in: query
          description: |
            Safe filter DSL (records, count modes). Format: `field:operator:value`, comma-separated.
            Operators: eq, ne, gt, gte, lt, lte, like, in, not_in, is_null, is_not_null
          schema:
            type: string
          example: "code:like:OH-%,lang:eq:lg-eng"
        - name: order
          in: query
          description: |
            Order DSL (records mode). Format: `field:direction`, comma-separated.
            Direction: asc or desc (default: asc)
          schema:
            type: string
          example: "title:asc"
        - name: limit
          in: query
          description: Maximum number of results (1-1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: offset
          in: query
          description: Number of results to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: section_id
          in: query
          description: Filter by section_id (comma-separated for multiple)
          schema:
            type: string
          example: "1,2,3"
        - name: lang
          in: query
          description: Language filter
          schema:
            type: string
            pattern: '^lg-[a-z]{2,5}$'
          example: lg-eng
        - name: q
          in: query
          description: Search query (fulltext, count modes)
          schema:
            type: string
          example: "guerra civil"
        - name: column
          in: query
          description: Column to search in (fulltext, text-fragment modes)
          schema:
            type: string
            default: transcription
        - name: terms
          in: query
          description: Search terms (text-fragment, av-fragment modes)
          schema:
            type: string
          example: economia
        - name: max_characters
          in: query
          description: Maximum characters per fragment (text-fragment, av-fragment modes)
          schema:
            type: integer
            default: 320
        - name: max_occurrences
          in: query
          description: Maximum fragments per term (text-fragment, av-fragment modes)
          schema:
            type: integer
            default: 1
        - name: count
          in: query
          description: |
            When true, returns only the total number of matching records without data rows.
            Works with records and fulltext modes. Applies all filters (filter, section_id, lang, q).
          schema:
            type: boolean
            default: false
        - name: resolve_relations
          in: query
          description: |
            JSON object mapping column names to target tables for forward relation resolution.
            Replaces JSON column values (arrays of section_ids) with full row data from the target table.
            Example: `{"image":"image","informant":"informant"}`
            Supports dot notation for deep resolution: `{"eventos.documentos":"image"}`
            Use `"auto"` for link columns that store the table name dynamically.
          schema:
            type: string
        - name: resolve_inverse_relations
          in: query
          description: |
            Resolves the `dd_relations` column to show which records point back to the current one.
            Pass `true` to auto-load the section_tipo→table mapping from `publication_schema`.
            Or pass a JSON object mapping section_tipo values to table names, e.g. `{"rsc170":"images","oh1":"interview"}`.
          schema:
            type: string
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RecordsSearchResult'
                  - $ref: '#/components/schemas/FulltextSearchResult'
                  - $ref: '#/components/schemas/TextFragmentResult'
                  - $ref: '#/components/schemas/AvFragmentResult'
                  - $ref: '#/components/schemas/CountSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /av-indexation-fragment:
    get:
      summary: Get audiovisual fragment from indexation locator
      description: |
        Resolve an indexation locator (from thesaurus) to an audiovisual fragment.
        Returns video clip with timecodes, transcription excerpt, posterframe, speaker info, and associated thesaurus terms.
        
        Replaces v1's `fragment_from_index_locator`.
      operationId: getAvIndexationFragment
      tags:
        - Audiovisual
      parameters:
        - name: section_id
          in: query
          required: true
          description: Section ID
          schema:
            type: integer
          example: 46
        - name: section_tipo
          in: query
          description: Section type identifier
          schema:
            type: string
          example: rsc167
        - name: component_tipo
          in: query
          description: Component type identifier
          schema:
            type: string
          example: rsc36
        - name: tag_id
          in: query
          description: Tag ID from indexation
          schema:
            type: integer
          example: 1
        - name: tc_in
          in: query
          description: Timecode in (seconds)
          schema:
            type: number
          example: 120.5
        - name: tc_out
          in: query
          description: Timecode out (seconds)
          schema:
            type: number
          example: 180.0
      responses:
        '200':
          description: Audiovisual fragment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvIndexationFragment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /batch:
    post:
      summary: Execute multiple queries in parallel
      description: |
        Execute multiple read operations in a single request. All queries run in parallel.
        Maximum 20 queries per batch request. Query IDs must be unique.
        
        Replaces v1's `combi`.
      operationId: executeBatch
      tags:
        - Batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
            example:
              queries:
                - id: interviews
                  endpoint: /search
                  params:
                    table: interview
                    limit: 5
                - id: search_war
                  endpoint: /search
                  params:
                    mode: fulltext
                    q: guerra
                    table: interview
                - id: schema
                  endpoint: /schema
                  params: {}
      responses:
        '200':
          description: Batch results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /docs:
    get:
      summary: API documentation
      description: Interactive OpenAPI documentation UI
      operationId: getDocs
      tags:
        - Documentation
      responses:
        '200':
          description: HTML documentation page
          content:
            text/html:
              schema:
                type: string

  /health:
    get:
      summary: Health check
      description: Check API and database connection status
      operationId: getHealth
      tags:
        - System
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional API key for authentication

  schemas:
    SchemaResponse:
      type: object
      properties:
        tables:
          type: array
          items:
            $ref: '#/components/schemas/TableInfo'
      required:
        - tables

    TableInfo:
      type: object
      properties:
        name:
          type: string
          description: Table name
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnInfo'
          description: Column information including name and data type
        row_count:
          type: integer
          description: Approximate row count
      required:
        - name
        - columns
        - row_count

    ColumnInfo:
      type: object
      properties:
        name:
          type: string
          description: Column name
        type:
          type: string
          description: MySQL data type
      required:
        - name
        - type

    RecordsSearchResult:
      type: object
      properties:
        mode:
          type: string
          enum: [records]
        data:
          type: array
          items:
            type: object
            additionalProperties: true
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - mode
        - data
        - total

    FulltextSearchResult:
      type: object
      properties:
        mode:
          type: string
          enum: [fulltext]
        data:
          type: array
          items:
            type: object
            properties:
              section_id:
                type: integer
              relevance:
                type: number
              fragments:
                type: array
                items:
                  type: object
                  properties:
                    text:
                      type: string
                    position:
                      type: integer
        total:
          type: integer
        query:
          type: string
      required:
        - mode
        - data
        - total
        - query

    TextFragmentResult:
      type: object
      properties:
        mode:
          type: string
          enum: [text-fragment]
        section_id:
          type: integer
        terms:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              text:
                type: string
                description: Fragment text with <mark> highlighting
              page:
                type: integer
                description: Page number (if available)
              position:
                type: integer
                description: Character position in source text
        total:
          type: integer
      required:
        - mode
        - data
        - total

    AvFragmentResult:
      type: object
      properties:
        mode:
          type: string
          enum: [av-fragment]
        section_id:
          type: integer
        terms:
          type: string
        data:
          type: array
          items:
            type: object
            properties:
              transcription:
                type: string
              media:
                $ref: '#/components/schemas/MediaInfo'
              speakers:
                type: array
                items:
                  $ref: '#/components/schemas/Speaker'
        total:
          type: integer
      required:
        - mode
        - data
        - total

    CountSearchResult:
      type: object
      description: Response when count=true. Returns total matching records without data rows.
      properties:
        mode:
          type: string
          description: The search mode used (records or fulltext)
        table:
          type: string
          description: Table name that was queried
        total:
          type: integer
          description: Total number of matching records
        data:
          type: array
          description: Always empty when count=true
          items:
            type: object
          maxItems: 0
        query:
          type: string
          description: Fulltext query (only present in fulltext mode)
        filter:
          type: string
          description: Filter DSL that was applied
      required:
        - mode
        - table
        - total

    AvIndexationFragment:
      type: object
      properties:
        locator:
          $ref: '#/components/schemas/Locator'
        transcription:
          type: string
        media:
          $ref: '#/components/schemas/MediaInfo'
        speakers:
          type: array
          items:
            $ref: '#/components/schemas/Speaker'
        terms:
          type: array
          items:
            $ref: '#/components/schemas/ThesaurusTerm'
      required:
        - locator
        - transcription
        - media

    Locator:
      type: object
      properties:
        section_id:
          type: integer
        section_tipo:
          type: string
        component_tipo:
          type: string
        tag_id:
          type: integer
        tc_in:
          type: number
        tc_out:
          type: number
      required:
        - section_id

    MediaInfo:
      type: object
      properties:
        video_url:
          type: string
          description: Video URL with timecode parameters
        image_url:
          type: string
          description: Posterframe image URL
        tc_in:
          type: number
          description: Timecode in (seconds)
        tc_out:
          type: number
          description: Timecode out (seconds)
      required:
        - video_url
        - image_url
        - tc_in
        - tc_out

    Speaker:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
      required:
        - name
        - role

    ThesaurusTerm:
      type: object
      properties:
        term_id:
          type: string
        term:
          type: string
      required:
        - term_id
        - term

    BatchRequest:
      type: object
      properties:
        queries:
          type: array
          items:
            $ref: '#/components/schemas/BatchQuery'
          maxItems: 20
      required:
        - queries

    BatchQuery:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for this query (must be unique within batch)
        endpoint:
          type: string
          enum: [/schema, /search, /av-indexation-fragment]
          description: Endpoint to call
        params:
          type: object
          additionalProperties: true
          description: Parameters for the endpoint
      required:
        - id
        - endpoint
        - params

    BatchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BatchResult'
      required:
        - results

    BatchResult:
      type: object
      properties:
        id:
          type: string
        status:
          type: integer
        data:
          type: object
          additionalProperties: true
        error:
          type: string
      required:
        - id
        - status

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, error]
        database:
          type: string
          enum: [connected, disconnected]
        uptime:
          type: number
          description: Server uptime in seconds
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          description: API version
        error:
          type: string
      required:
        - status
        - database
        - uptime
        - timestamp
        - version

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        status:
          type: integer
        code:
          type: string
          description: Error code for programmatic handling
      required:
        - error
        - status

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - ApiKeyAuth: []
  - {}