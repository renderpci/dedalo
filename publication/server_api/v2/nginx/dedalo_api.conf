# Dédalo Publication API v2 - Nginx Reverse Proxy Configuration
# Place this file in /etc/nginx/conf.d/ or include in server block
# Reload with: nginx -s reload

upstream dedalo_api_v2 {
    server 127.0.0.1:3100;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;

    # Redirect to HTTPS (recommended for production)
    # return 301 https://$server_name$request_uri;

    # API v2 location block
    location /publication/server_api/v2/ {
        proxy_pass http://dedalo_api_v2/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # MCP SSE endpoint (requires special handling)
    location /publication/server_api/v2/mcp {
        proxy_pass http://dedalo_api_v2/mcp;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;

        # Increase timeout for long-lived SSE connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # SSE headers
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # Health check (optional: restrict to localhost)
    location /publication/server_api/v2/health {
        proxy_pass http://dedalo_api_v2/health;

        # Optional: restrict to localhost
        # allow 127.0.0.1;
        # deny all;
    }
}

