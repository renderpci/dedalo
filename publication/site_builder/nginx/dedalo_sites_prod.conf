# Dédalo Site Builder — PRODUCTION serving.
#
# Same wildcard-vhost model as preprod, rooted at PROD_ROOT. Production releases are
# COPIES (not links into a workspace), so a published site keeps serving even if its
# workspace is deleted. Publish and rollback swap the per-site symlink atomically — no
# reload.
#
# No basic auth here: production sites are public by intent. A site that should have its
# OWN domain gets a small dedicated server{} block whose `root` points at
# PROD_ROOT/<slug> (the operator adds it manually — see docs).
#
# Install: copy to /etc/nginx/sites-available/, set server_name + root to your PROD_ROOT,
# add TLS, then `nginx -t && reload`.

server {
    listen 80;
    listen [::]:80;
    server_name www.example.org;

    # Must equal the daemon's PROD_ROOT.
    root /var/www/dedalo_sites;
    index index.html;

    disable_symlinks off;

    location / {
        try_files $uri $uri/ =404;
    }
}
