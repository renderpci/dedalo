# Dédalo Site Builder — PRE-PRODUCTION serving.
#
# One wildcard vhost serves every site: each site is a directory (a symlink into the
# release store) under PREPROD_ROOT, so creating, building, publishing and rolling back a
# site need ZERO nginx reloads and no root at runtime. The daemon only ever swaps a
# symlink; nginx follows it.
#
# Basic auth is ENABLED by default: pre-production sites are drafts and must not be
# publicly indexable. Generate the htpasswd file with the installer (or:
#   htpasswd -c /etc/dedalo_sites/preprod.htpasswd <user>
# ). To make a preprod site public, comment the two auth_* lines.
#
# Install: copy to /etc/nginx/sites-available/, symlink into sites-enabled/, set the
# server_name and root to your PREPROD_ROOT, add TLS (certbot), then `nginx -t && reload`.

server {
    listen 80;
    listen [::]:80;
    server_name preprod.example.org;

    # Must equal the daemon's PREPROD_ROOT.
    root /var/lib/dedalo_sites/preprod;
    index index.html;

    # Follow the per-site symlinks into the release store.
    disable_symlinks off;

    auth_basic "Dédalo pre-production";
    auth_basic_user_file /etc/dedalo_sites/preprod.htpasswd;

    # Static site: serve the file, fall back to the site's index for client-side routing,
    # else 404. The trailing segment is the site slug.
    location / {
        try_files $uri $uri/ =404;
    }

    # Drafts should never be indexed even behind basic auth.
    add_header X-Robots-Tag "noindex, nofollow" always;
}
