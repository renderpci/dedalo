# Dédalo Site Builder — Apache serving (preprod + prod).
#
# The nginx configs are the recommended path; these are the Apache equivalents for hosts
# that already run httpd. Same model: one vhost per surface over a directory of per-site
# symlinks; the daemon swaps symlinks, Apache follows them (FollowSymLinks). No reload on
# create/build/publish/rollback.

# --- PRE-PRODUCTION (basic auth on by default; drafts are not public) ---
<VirtualHost *:80>
    ServerName preprod.example.org
    DocumentRoot /var/lib/dedalo_sites/preprod

    <Directory /var/lib/dedalo_sites/preprod>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        AuthType Basic
        AuthName "Dédalo pre-production"
        AuthUserFile /etc/dedalo_sites/preprod.htpasswd
        Require valid-user
    </Directory>

    Header always set X-Robots-Tag "noindex, nofollow"
</VirtualHost>

# --- PRODUCTION (public) ---
<VirtualHost *:80>
    ServerName www.example.org
    DocumentRoot /var/www/dedalo_sites

    <Directory /var/www/dedalo_sites>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
</VirtualHost>
